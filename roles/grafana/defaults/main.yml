---
# Grafana service configuration
# These variables are used by both the Grafana installation and nginx configuration

grafana_service_port: 3000
grafana_oauth2_port: 4180

# Domains are defined in host_vars
# grafana_domains: []
# grafana_oauth2_client_id: ""
# grafana_oauth2_client_secret: ""

# Primary domain for nginx SSL certificate paths (must NOT use grafana_domain as it's deprecated)
grafana_primary_domain: "{{ grafana_domains[0] }}"

# Note: All Grafana configuration is now done via grafana_ini in host_vars
# Deprecated variables that must NOT be set (grafana.grafana >= 6.0.0):
# - grafana_security, grafana_server, grafana_database, grafana_auth
# - grafana_logs_dir, grafana_data_dir, grafana_remote_cache
# - grafana_users, grafana_session, grafana_analytics, grafana_smtp
# - grafana_alerting, grafana_unified_alerting, grafana_log, grafana_metrics
# - grafana_tracing, grafana_snapshots, grafana_image_storage
# - grafana_date_formats, grafana_feature_toggles, grafana_plugins_ops
# - grafana_instance, grafana_address, grafana_port, grafana_domain, grafana_url, grafana_panels
