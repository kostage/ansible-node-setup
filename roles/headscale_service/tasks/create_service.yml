---
- name: 'Create Headscale systemd service file'
  become: true
  ansible.builtin.template:
    src: headscale.service.j2
    dest: /etc/systemd/system/headscale.service
    owner: root
    group: root
    mode: '0644'

- name: 'Reload systemd daemon'
  become: true
  ansible.builtin.systemd:
    daemon_reload: true