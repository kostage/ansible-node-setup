---
- name: 'Install Headplane service dependencies'
  include_tasks: install_dependencies.yml

- name: 'Build and install Headplane'
  include_tasks: build_headplane.yml

- name: 'Configure Headplane'
  include_tasks: configure_headplane.yml

- name: 'Create Headplane systemd service'
  include_tasks: create_service.yml

- name: 'Start and enable Headplane service'
  become: true
  ansible.builtin.systemd:
    name: headplane
    enabled: true
    state: restarted

- name: 'Install apache2-utils for htpasswd'
  become: true
  ansible.builtin.apt:
    name:
      - apache2-utils
    state: present

- name: 'Create htpasswd file for nginx basic auth'
  become: true
  ansible.builtin.shell:
    cmd: |
      htpasswd -bc /etc/nginx/.htpasswd-headplane {{ headplane_basic_auth_user }} {{ headplane_basic_auth_password }}
    creates: /etc/nginx/.htpasswd-headplane

- name: 'Set htpasswd file permissions'
  become: true
  ansible.builtin.file:
    path: /etc/nginx/.htpasswd-headplane
    owner: root
    group: www-data
    mode: '0644'

- name: 'Create SSL certificate for Headplane'
  ansible.builtin.import_role:
    name: certbot
  vars:
    certbot_name: headplane
    certbot_domains: "{{ headplane_domains }}"
    certbot_email: "{{ user.email }}"

- name: 'Configure nginx for Headplane'
  ansible.builtin.import_role:
    name: nginx_config
  vars:
    nginx_config_template: "nginx.conf.j2"
    nginx_config_service_name: "headplane"
