---
ssh_port: 22
ansible_become_password: "{{ lookup('keepass', 'headplane/root', 'password') }}"

user:
  name: "{{ lookup('keepass', 'headplane/user', 'username') }}"
  password: "{{ lookup('keepass', 'headplane/user', 'password') }}"
  sshkey_save_path: '/Users/kostage/Doroshenko/nodes/headplane/ssh'
  email: "{{ lookup('keepass', 'headplane/email', 'password') }}"

headscale_domains:
  - "headscale.{{ lookup('keepass', 'headplane/domain_name', 'username') }}"
  - "www.headscale.{{ lookup('keepass', 'headplane/domain_name', 'username') }}"

headplane_domains:
  - "headplane.{{ lookup('keepass', 'headplane/domain_name', 'username') }}"
  - "www.headplane.{{ lookup('keepass', 'headplane/domain_name', 'username') }}"

# Internal service ports
headscale_service_port: 4444
headplane_service_port: 7777
http_port: 80

# Prometheus configuration
prometheus:
  nodes: []

# Alertmanager configuration
alertmanager_version: latest
alertmanager_system_user: alertmanager
alertmanager_receivers:
  - name: 'telegram'
    telegram_configs:
      - api_url: 'https://api.telegram.org'
        bot_token: "{{ lookup('keepass', 'telegram_bot/token', 'password') }}"
        chat_id: "{{ telegram_chat_id }}" # take from inventory due to weird integer var behavior
        disable_notifications: false
        http_config:
          follow_redirects: true
        send_resolved: true
        parse_mode: HTML

alertmanager_route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: 'telegram'

# Firewall configuration
firewall_rules:
  - rule: allow
    port: 443
  - rule: allow
    port: 80
  - rule: allow
    port: 22

# Package configuration
apt_packages:
  - curl
  - wget
  - git
  - unzip
  - python3
  - python3-pip
  - python3-debian
  - software-properties-common
  - build-essential

headscale_dns_domain: "{{ lookup('keepass', 'headplane/domain_name', 'username') }}"
headscale_server_url: "https://headscale.{{ lookup('keepass', 'headplane/domain_name', 'username') }}:443"

headplane_basic_auth_user: "{{ user.name }}"
headplane_basic_auth_password: "{{ lookup('keepass', 'headplane/user', 'password') }}"
headplane_domain: "headplane.{{ lookup('keepass', 'headplane/domain_name', 'username') }}"

# Grafana configuration
grafana_admin_user: "{{ lookup('keepass', 'headplane/user', 'username') }}"
grafana_admin_password: "{{ lookup('keepass', 'headplane/user', 'password') }}"
grafana_system_user: "grafana"
grafana_system_uid: 472
grafana_domains:
  - "dashboard.{{ lookup('keepass', 'headplane/domain_name', 'username') }}"
  - "www.dashboard.{{ lookup('keepass', 'headplane/domain_name', 'username') }}"
grafana_service_port: 3000

# Disable built-in repository management (we handle it manually due to geo-blocking)
grafana_manage_repo: false

# Grafana configuration using new grafana_ini structure (grafana.grafana >= 6.0.0)
grafana_ini:
  security:
    admin_user: "{{ lookup('keepass', 'headplane/user', 'username') }}"
    admin_password: "{{ lookup('keepass', 'headplane/user', 'password') }}"
    cookie_secure: true
    cookie_samesite: lax
    disable_gravatar: true
    content_security_policy: true
    x_content_type_options: true
    x_xss_protection: true
